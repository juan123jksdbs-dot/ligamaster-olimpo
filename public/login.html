<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Impedir que esta página quede en bfcache -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>LigaMaster SaaS — Iniciar Sesión</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="login-page">
  <div class="login-box">

    <!-- Logo con enlace de regreso al inicio -->
    <div class="login-logo">
      <a href="/" style="text-decoration:none; color:inherit; display:inline-flex; align-items:center; gap:10px;">
        <span style="font-size:2rem;">⚽</span>
        <div>
          <h1 style="margin:0; font-size:1.6rem; font-weight:700; letter-spacing:-0.5px;">LigaMaster</h1>
          <p style="margin:0; font-size:0.78rem; color:var(--text2);">Plataforma SaaS para gestión de ligas</p>
        </div>
      </a>
    </div>

    <div id="error-msg" style="display:none; background:rgba(218,54,51,0.15); border:1px solid rgba(218,54,51,0.4);
         color:#f85149; padding:10px 14px; border-radius:8px; margin-bottom:16px; font-size:13px;"></div>

    <div class="form-grid full">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="superadmin@ligamaster.com" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="off">
      </div>
    </div>

    <button class="btn btn-primary" id="btn-login" style="width:100%; margin-top:8px; justify-content:center; padding:11px;">
      Iniciar Sesión
    </button>

    <div style="text-align:center; margin-top:14px;">
      <a href="/" style="font-size:12px; color:var(--text2); text-decoration:none;">← Volver al inicio</a>
    </div>

    <div style="margin-top:24px; padding:14px; background:var(--bg3); border-radius:8px; font-size:12px; color:var(--text2);">
      <strong style="color:var(--text)">Datos de prueba (seed):</strong><br>
      SuperAdmin: <code>superadmin@ligamaster.com</code><br>
      Organizador: <code>carlos@ligatijuana.com</code><br>
      Contraseña para todos: <code>admin123</code>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/utils.js"></script>
<script src="js/login.js"></script>
</body>
</html>
